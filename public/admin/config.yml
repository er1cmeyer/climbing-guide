backend:
  name: github
  repo: er1cmeyer/climbing-guide
  branch: master
  # Netlify handles the OAuth server for the default GitHub backend flow.
  # Leave base_url/auth_endpoint unset unless you move auth off Netlify.

site_url: https://climbing-guide.netlify.app
display_url: https://climbing-guide.netlify.app
logo:
  src: /admin/gunks-routes-logo.png
  show_in_header: true
media_folder: public/uploads
public_folder: /uploads
media_library:
  name: cloudinary
  config:
    cloud_name: duxnrxcjx
    api_key: '525961968994667'
    default_transformations:
      - - fetch_format: auto
          quality: auto
          crop: limit

collections:
  - name: routes
    label: Routes
    label_singular: Route
    folder: src/content/routes
    create: true
    extension: md
    format: frontmatter
    slug: '{{slug}}'
    sortable_fields: ['order', 'route', 'rating']
    summary: '{{order}} - {{route}} {{area}}'
    fields:
      - { label: Route, name: route, widget: string }
      - { label: Rating, name: rating, widget: string }
      - { label: Area, name: area, widget: string, required: false }
      - { label: Order, name: order, widget: number, value_type: float, min: 0, step: 0.01 }
      - { label: Body, name: body, widget: markdown }
